<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38a1ff"/>
      <stop offset="100%" stop-color="#0052ab"/>
    </linearGradient>
    <linearGradient id="road" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2f3a"/>
      <stop offset="100%" stop-color="#12151b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#sky)"/>
  <polygon points="0,500 800,500 560,260 240,260" fill="url(#road)"/>
  <g stroke="#ffe066" stroke-width="6" stroke-dasharray="28 28" stroke-linecap="round">
    <line x1="400" y1="260" x2="400" y2="500"/>
  </g>
  <g fill="#fff" opacity="0.85">
    <circle cx="120" cy="90" r="22"/>
    <circle cx="160" cy="80" r="14"/>
    <circle cx="200" cy="95" r="18"/>
    <circle cx="620" cy="70" r="18"/>
    <circle cx="660" cy="85" r="14"/>
  </g>
  <g transform="translate(320 340)">
    <rect x="0" y="30" width="160" height="60" rx="12" fill="#e63946"/>
    <rect x="20" y="0" width="120" height="40" rx="10" fill="#c1121f"/>
    <circle cx="30" cy="95" r="14" fill="#111"/>
    <circle cx="130" cy="95" r="14" fill="#111"/>
    <rect x="28" y="10" width="40" height="26" rx="4" fill="#baddff"/>
    <rect x="92" y="10" width="40" height="26" rx="4" fill="#baddff"/>
  </g>
  <text x="400" y="60" text-anchor="middle" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="36" font-weight="800" fill="#fff">SimuDrive</text>
  <text x="400" y="90" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#e0efff">Real Life Car Driving Simulator</text>
</svg>
